<!DOCTYPE html>
<html>
<head>
    <title>Math Simulation - Lab 4</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { color: #4CAF50; margin-bottom: 20px; }
        .game-btn { 
            background: #333; 
            border: 2px solid #4CAF50; 
            color: white; 
            padding: 15px 32px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 18px; 
            width: 320px; 
            text-decoration: none;
            transition: 0.3s;
        }
        .game-btn:hover { background: #4CAF50; color: black; }
        #panic-ui { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; font-size: 12px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Laboratory Modules</h1>
        
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/dadish-2/index.html'">Module 1: Bio-Test (Dadish 2)</button>
        
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/slope/index.html'">Module 2: Slope Analysis</button>
        
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/basket-random/index.html'">Module 3: Physics Test</button>

        <button class="game-btn" onclick="window.location.href='https://banib4813-lab.github.io/altbunny/'">Module 4: Reset / Snake</button>

        <p style="opacity: 0.5; margin-top: 20px;">Select a module to begin simulation.</p>
    </div>

    <div id="panic-ui">Press 'P' for Portal</div>

    <script>
        document.addEventListener("keydown", function(e) {
            if(e.key.toLowerCase() === 'p') {
                window.location.href = "https://www.lwsd.org";
            }
        });
    </script>
</body>
</html>
