<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Subtle Background Bunny */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bunny-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 50%; 
            opacity: 0.08;
            z-index: 1; /* Behind the box */
            pointer-events: none;
        }
        
        header { 
            background: rgba(20, 20, 20, 0.98); 
            padding: 10px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 900; color: #ff00ff; display: flex; align-items: center; letter-spacing: 2px; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; border: 1px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 25px; }
        nav a { color: #eee; text-decoration: none; font-size: 13px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        nav a:hover { color: #ff00ff; }

        /* --- THE NEON BOX --- */
        #main-ui { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 10;
        }

        .neon-box {
            border: 3px solid #ff00ff;
            padding: 50px 100px;
            border-radius: 15px;
            background: rgba(10, 10, 10, 0.8);
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff;
            text-align: center;
        }

        .neon-text {
            font-size: 5.5em;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 12px;
            font-weight: 900;
            text-shadow: 
                0 0 7px #fff,
                0 0 15px #ff00ff,
                0 0 30px #ff00ff;
        }

        .console-status {
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            font-size: 0.9em;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Modules Menu Overlay */
        #modules-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.98);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .game-card {
            background: #111;
            border: 2px solid #ff00ff;
            color: white;
            padding: 18px;
            margin: 8px;
            width: 380px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            transition: 0.3s;
        }
        .game-card:hover { background: #ff00ff; color: black; box-shadow: 0 0 25px #ff00ff; }

        #panic-ui { position: fixed; bottom: 15px; right: 20px; opacity: 0.4; font-size: 11px; color: #ff00ff; font-weight: bold; z-index: 1000; }
    </style>
</head>
