<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bunny-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 40%; 
            opacity: 0.05;
            z-index: 1;
            pointer-events: none;
        }
        
        header { 
            background: rgba(15, 15, 15, 0.95); 
            padding: 10px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
            z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 900; color: #ff00ff; display: flex; align-items: center; letter-spacing: 2px; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; margin-right: 12px; border: 1px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 25px; }
        nav a { color: #eee; text-decoration: none; font-size: 13px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        nav a:hover { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }

        #main-ui { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            z-index: 10;
        }

        .neon-text {
            font-size: 7em;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 15px;
            font-weight: 900;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 80px #ff00ff, 0 0 120px #ff00ff;
        }

        .console-status {
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            font-size: 1em;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        #modules-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
        }

        .game-card {
            background: #111;
            border: 2px solid #ff00ff;
            color: white;
            padding: 20px;
            width: 280px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            transition: 0.3s;
        }
        .game-card:hover { background: #ff00ff; color: black; box-shadow: 0 0 25px #ff00ff; transform: scale(1.05); }

        #panic-ui { position: fixed; bottom: 15px; right: 20px; opacity: 0.4; font-size: 11px; color: #ff00ff; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <div class="logo">
            <img src="bunny-logo.png" alt="" class="logo-img" onerror="this.style.display='none'">
            ALTBUNNY
        </div>
        <nav>
            <ul>
                <li><a onclick="closeModules()">Home</a></li>
                <li><a onclick="openModules()">Modules</a></li>
                <li><a href="https://login.classlink.com/my/lwsd">Portal</a></li>
            </ul>
        </nav>
    </header>

    <div id="main-ui">
        <h1 class="neon-text">ALTBUNNY</h1>
        <p class="console-status">> BYPASS_TERMINAL: ONLINE</p>
    </div>

    <div id="modules-page">
        <h2 style="color: #ff00ff; font-size: 2.5em; margin-bottom: 10px; letter-spacing: 5px;">ACTIVE_MODULES</h2>
        <div class="game-grid">
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/dadish-2/'">Dadish 2</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/slope/'">Slope</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/basket-random/'">Basket Random</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/1v1lol/'">1v1.LOL</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/snow-rider-3d/'">Snow Rider 3D</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/retro-bowl/'">Retro Bowl</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/appel/'">Appel</div>
            <div class="game-card" onclick="location.href='https://hubbleplay.github.io/games/bitlife/'">Bitlife</div>
        </div>
        <p style="margin-top: 30px; color: #555; cursor: pointer; font-weight: bold;" onclick="closeModules()">[ EXIT_TERMINAL ]</p>
    </div>

    <div id="panic-ui">EMERGENCY 'P' ARMED</div>

    <script>
        function openModules() {
            document.getElementById('modules-page').style.display = 'flex';
            document.getElementById('main-ui').style.display = 'none';
        }
        function closeModules() {
            document.getElementById('modules-page').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
        }
        document.addEventListener("keydown", e => {
            if(e.key.toLowerCase() === 'p') window.location.href = "https://login.classlink.com/my/lwsd";
        });
    </script>
</body>
</html>
