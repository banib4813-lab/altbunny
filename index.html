<!DOCTYPE html>
<html>
<head>
    <title>Math Simulation - Lab 4</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #menu { padding: 50px; }
        .game-btn { background: #4CAF50; border: none; color: white; padding: 15px 32px; margin: 10px; cursor: pointer; border-radius: 8px; font-size: 16px; }
        .game-btn:hover { background: #45a049; }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
        #panic-ui { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; font-size: 12px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Select Laboratory Module</h1>
        <button class="game-btn" onclick="loadGame('https://images-opensocial.googleusercontent.com/gadgets/proxy?container=fb&url=https://hubbleplay.github.io/games/slope/index.html')">Module 1: Slope Analysis</button>
        <button class="game-btn" onclick="loadGame('https://images-opensocial.googleusercontent.com/gadgets/proxy?container=fb&url=https://hubbleplay.github.io/games/1v1lol/index.html')">Module 2: Structural Geometry</button>
        <button class="game-btn" onclick="location.reload()">Module 3: Reset to Snake</button>
    </div>

    <iframe id="game-frame" src=""></iframe>
    <div id="panic-ui">Press 'P' for Portal</div>

    <script>
        function loadGame(url) {
            document.getElementById('menu').style.display = 'none';
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
        }

        document.addEventListener("keydown", function(e) {
            if(e.key.toLowerCase() === 'p') window.location.href = "https://www.lwsd.org";
        });
    </script>
</body>
</html>
