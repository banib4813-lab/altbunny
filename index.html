<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* The Background Logo - MASSIVE */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bunny-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 150%; /* Super sized */
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }
        
        header { 
            background: rgba(20, 20, 20, 0.9); 
            padding: 15px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            z-index: 10;
        }

        .logo { font-size: 26px; font-weight: 900; color: #ff00ff; display: flex; align-items: center; letter-spacing: 3px; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; border: 2px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 25px; }
        nav a { color: #eee; text-decoration: none; font-size: 13px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        nav a:hover { color: #ff00ff; text-shadow: 0 0 8px #ff00ff; }

        #main-ui { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 5em; margin: 0; color: #ff00ff; text-shadow: 0 0 20px #ff00ff; letter-spacing: 10px; }
        .console-text { font-family: 'Courier New', monospace; color: #00ffff; font-size: 1.1em; margin-top: 10px; opacity: 0.9; }

        /* Modules Menu - Fixed */
        #modules-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .game-card {
            background: #1a1a1a;
            border: 1px solid #ff00ff;
            color: white;
            padding: 20px;
            margin: 10px;
            width: 400px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            text-align: center;
        }
        .game-card:hover { background: #ff00ff; color: black; box-shadow: 0 0 25px #ff00ff; transform: scale(1.02); }

        #panic-ui { position: fixed; bottom: 15px; right: 20px; opacity: 0.3; font-size: 11px; color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <div class="logo">
            <img src="bunny-logo.png" alt="" class="logo-img">
            ALTBUNNY
        </div>
        <nav>
            <ul>
                <li><a onclick="closeModules()">Home</a></li>
                <li><a onclick="openModules()">Modules</a></li>
                <li><a href="https://login.classlink.com/my/lwsd">Portal</a></li>
            </ul>
        </nav>
