<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { 
            background: #222; 
            padding: 10px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
        }
        .logo { font-size: 24px; font-weight: bold; color: #ff00ff; display: flex; align-items: center; text-transform: uppercase; }
        
        /* This looks for the file you just uploaded */
        .logo-img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; border: 1px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 20px; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; cursor: pointer; font-weight: 600; }
        nav a:hover { color: #ff00ff; }

        #main-content { padding: 50px; text-align: center; }
        .game-btn { background: #333; border: 2px solid #ff00ff; color: white; padding: 15px 32px; margin: 10px; cursor: pointer; border-radius: 8px; font-size: 18px; width: 280px; transition: 0.3s; }
        .game-btn:hover { background: #ff00ff; color: black; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="bunny-logo.png" alt="Bunny" class="logo-img">
            ALTBUNNY
        </div>
        <nav>
            <ul>
                <li><a onclick="location.reload()">Home</a></li>
                <li><a onclick="location.reload()">Modules</a></li>
                <li><a href="https://login.classlink.com/my/lwsd">Portal</a></li>
            </ul>
        </nav>
    </header>

    <div id="main-content">
        <h1>ALTBUNNY : : DATA SUITE</h1>
        <p>Select a laboratory module to begin encrypted analysis.</p>
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/dadish-2/index.html'">Module 1: Bio-Test (Dadish 2)</button>
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/slope/index.html'">Module 2: Slope Analysis</button>
    </div>

    <script>
        document.addEventListener("keydown", e => {
            if(e.key.toLowerCase() === 'p') window.location.href = "https://login.classlink.com/my/lwsd";
        });
    </script>
</body>
</html>
