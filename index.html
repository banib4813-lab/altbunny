<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Subtle Background Logo */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bunny-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 50%; 
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }
        
        header { 
            background: rgba(20, 20, 20, 0.95); 
            padding: 15px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
            z-index: 10;
        }

        .logo { font-size: 24px; font-weight: 900; color: #ff00ff; display: flex; align-items: center; letter-spacing: 2px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; border: 1px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 25px; }
        nav a { color: #eee; text-decoration: none; font-size: 13px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        nav a:hover { color: #ff00ff; }

        /* --- THE NEON TEXT BOX --- */
        #main-ui { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .neon-box {
            border: 4px solid #ff00ff;
            padding: 40px 80px;
            border-radius: 20px;
            background: rgba(255, 0, 255, 0.05);
            box-shadow: 0 0 20px #ff00ff, inset 0 0 15px #ff00ff;
            text-align: center;
        }

        .neon-text {
            font-size: 6em;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 15px;
            font-weight: 900;
            /* Pink Neon Glow */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff;
        }

        .console-status {
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            font-size: 1em;
            letter-spacing: 2px;
        }

        /* Modules Menu Overlay */
        #modules-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.98);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
