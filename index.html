<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* The Background Logo Effect */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bunny-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 60%;
            opacity: 0.1; /* Adjust this to make it more or less visible */
            z-index: -1;
        }
        
        header { 
            background: rgba(34, 34, 34, 0.9); 
            padding: 10px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
            backdrop-filter: blur(5px);
        }

        .logo { font-size: 24px; font-weight: bold; color: #ff00ff; display: flex; align-items: center; text-transform: uppercase; }
        .logo-img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; border: 1px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 20px; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; cursor: pointer; font-weight: 600; text-transform: uppercase; }
        nav a:hover { color: #ff00ff; }

        #main-content { padding: 100px 50px; text-align: center; }
        h1 { font-size: 3em; letter-spacing: 5px; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }

        /* Module Overlay */
        #module-overlay {
            display: none;
            position: fixed;
            top: 70px; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.95);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .game-btn { 
            background: #222; 
            border: 2px solid #ff00ff; 
            color: white; 
            padding: 15px 32px; 
            margin: 15px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 18px; 
            width: 350px; 
            transition: 0.3s;
            text-transform: uppercase;
        }
        .game-btn:hover { background: #ff00ff; color: black; box-shadow: 0 0 20px #ff00ff; }

        #panic-ui { position: fixed; bottom: 10px; right: 10px; opacity: 0.2; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="bunny-logo.png" alt="Bunny" class="logo-img">
            ALTBUNNY
        </div>
        <nav>
            <ul>
                <li><a onclick="closeModules()">Home</a></li>
                <li><a onclick="openModules()">Modules</a></li>
                <li><a href="https://login.classlink.com/my/lwsd">Portal</a></li>
            </ul>
        </nav>
    </header>

    <div id="main-content">
        <h1>ALTBUNNY OS</h1>
        <p style="font-size: 18px; opacity: 0.7;">System Online. Encrypted Analysis Suite Ready.</p>
        <p style="margin-top: 40px; font-style: italic; opacity: 0.5;">Select "Modules" from the top menu to access data simulations.</p>
    </div>

    <div id="module-overlay">
        <h2 style="color: #ff00ff;">ACTIVE SIMULATIONS</h2>
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/dadish-2/'">Run Bio-Test (Dadish 2)</button>
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/slope/'">Slope Analysis</button>
        <button class="game-btn" onclick="window.location.href='https://hubbleplay.github.io/games/basket-random/'">Physics Test</button>
        <button class="game-btn" style="border-color: #666; font-size: 14px;" onclick="closeModules()">Close Terminal</button>
    </div>

    <div id="panic-ui">Press 'P' for Portal</div>

    <script>
        function openModules() {
            document.getElementById('module-overlay').style.display = 'flex';
        }

        function closeModules() {
            document.getElementById('module-overlay').style.display = 'none';
        }

        // Panic Button
        document.addEventListener("keydown", e => {
            if(e.key.toLowerCase() === 'p') window.location.href = "https://login.classlink.com/my/lwsd";
        });
    </script>
</body>
</html>
