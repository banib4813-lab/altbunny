<!DOCTYPE html>
<html>
<head>
    <title>ALTBUNNY OS</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* The Background Logo - Now Bigger */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bunny-logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 85%; /* Increased from 60% to 85% */
            opacity: 0.15; /* Slightly more visible */
            z-index: -1;
        }
        
        header { 
            background: rgba(34, 34, 34, 0.95); 
            padding: 10px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ff00ff;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 24px; font-weight: bold; color: #ff00ff; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 2px; }
        .logo-img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; border: 1px solid #ff00ff; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; }
        nav li { margin-left: 20px; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }

        #main-content { padding: 120px 50px; text-align: center; }
        h1 { font-size: 4em; letter-spacing: 8px; color: #ff00ff; text-shadow: 0 0 15px #ff00ff; margin-bottom: 5px; }
        .status-text { font-size: 1.2em; color: #00ffff; font-family: 'Courier New', monospace; opacity: 0.8; }
