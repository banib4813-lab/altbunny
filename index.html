<!DOCTYPE html>
<html>

        body { margin: 0; padding: 0; overflow: hidden; background-color: #faf8ef; font-family: sans-serif; }
        iframe { width: 100vw; height: 100vh; border: none; }

    <div id="panic-ui">Press 'P' for Portal</div>

    <script>
        // PANIC BUTTON: Press 'P' to go to lwsd.org

        });
    </script>
