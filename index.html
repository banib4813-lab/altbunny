<!DOCTYPE html>
<html>
<head>
    <title>Math Simulation - Lab 4</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .game-btn { background: #333; border: 2px solid #4CAF50; color: white; padding: 15px 32px; margin: 10px; cursor: pointer; border-radius: 8px; font-size: 18px; width: 320px; transition: 0.3s; }
        .game-btn:hover { background: #4CAF50; color: black; }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
        #panic-ui { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Laboratory Modules</h1>
        <button class="game-btn" onclick="location.reload()">Module 1: Reset / Snake</button>
        
        <button class="game-btn" onclick="loadGame('https://images-opensocial.googleusercontent.com/gadgets/proxy?container=fb&url=https://hubbleplay.github.io/games/dadish-2/index.html')">Module 2: Dadish 2 (Platforming)</button>
        <button class="game-btn" onclick="loadGame('https://images-opensocial.googleusercontent.com/gadgets/proxy?container=fb&url=https://hubbleplay.github.io/games/slope/index.html')">Module 3: Slope Analysis</button>
        <button class="game-btn" onclick="loadGame('https://images-opensocial.googleusercontent.com/gadgets/proxy?container=fb&url=https://hubbleplay.github.io/games/basket-random/index.html')">Module 4: Physics Test</button>
        
        <p style="opacity: 0.5; margin-top: 20px;">Select a module to begin simulation.</p>
    </div>

    <iframe id="game-frame" src=""></iframe>
    <div id="panic-ui">Press 'P' for Portal</div>

    <script>
        function loadGame(url) {
            document.getElementById('menu').style.display = 'none';
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
        }

        // Global Panic Button
        document.addEventListener("keydown", function(e) {
            if(e.key.toLowerCase() === 'p') {
                window.location.href = "https://www.lwsd.org";
            }
        });
    </script>
</body>
</html>
